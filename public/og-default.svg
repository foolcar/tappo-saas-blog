  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="500" r="120" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Emoji icon -->
